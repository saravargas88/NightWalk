<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Darkest 1000 images</title>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; padding: 16px; }
  h2 { margin-bottom: 4px; }
  p  { color: #aaa; font-size: 13px; margin-bottom: 12px; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .threshold-wrap { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #aaa; }
  .threshold-wrap input[type=range] { width: 140px; accent-color: #888; }
  #thresh-val { color: #fff; font-weight: bold; min-width: 36px; }
  .count { font-size: 13px; color: #888; }
  .grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .card { width: 200px; background: #222; border-radius: 6px; overflow: hidden; }
  .card.dimmed { opacity: 0.2; }
  .card img { width: 100%; height: 140px; object-fit: cover; display: block; }
  .meta { font-size: 11px; padding: 5px 8px; display: flex; justify-content: space-between; color: #888; }
  .meta .grey { color: #fff; font-weight: bold; }
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 99px; background: #333; color: #aaa; }
  #status { color: #888; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<h2>Darkest 1000 images — greyscale brightness</h2>
<p>Sorted darkest to brightest. Use threshold slider to mark cutoff.</p>

<div id="status">Loading…</div>

<div class="controls" id="controls" style="display:none">
  <div class="threshold-wrap">
    Cutoff:
    <input type="range" min="0" max="255" value="106" step="1" id="thresh-slider" oninput="updateThreshold()">
    <span id="thresh-val">106</span>
  </div>
  <div class="threshold-wrap">
    Hour filter:
    <select id="hour-filter" onchange="render()"
      style="background:#2a2a2a;border:1px solid #444;color:#eee;padding:6px 10px;border-radius:6px;font-size:13px;">
      <option value="">All hours</option>
    </select>
  </div>
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const CSV_PATH = 'all_brightness.csv'; // relative to server root

let data = [];

Papa.parse(CSV_PATH, {
  download: true,
  header: true,
  dynamicTyping: true,
  complete: function(results) {
    data = results.data
      .filter(r => r.image || r.name)
      .map(r => ({ ...r, image: (r.image || r.name || '').trim() }));
    document.getElementById('status').style.display = 'none';
    buildHourFilter();
    document.getElementById('controls').style.display = 'flex';
    render();
  },
  error: function(err) {
    document.getElementById('status').textContent = 'Error loading ' + CSV_PATH + ': ' + err.message;
  }
});

function buildHourFilter() {
  const hours = [...new Set(data.map(r => r.hour).filter(h => h != null))].sort((a, b) => a - b);
  const sel = document.getElementById('hour-filter');
  sel.innerHTML = '<option value="">All hours</option>' +
    hours.map(h => '<option value="' + h + '">' + h + 'h</option>').join('');
}

function updateThreshold() {
  document.getElementById('thresh-val').textContent = document.getElementById('thresh-slider').value;
  render();
}

function render() {
  const thresh = +document.getElementById('thresh-slider').value;
  const hourFilter = document.getElementById('hour-filter').value;

  let filtered = hourFilter !== '' ? data.filter(r => r.hour == hourFilter) : data;

  const below = filtered.filter(r => r.grey <= thresh).length;
  document.getElementById('count').textContent = below + ' images below cutoff';

  document.getElementById('grid').innerHTML = filtered.map(function(r) {
    return '<div class="card ' + (r.grey > thresh ? 'dimmed' : '') + '">' +
      '<img src="/urban-mosaic/washington-square/' + r.image + '" loading="lazy" onerror="this.style.background=\'#333\';this.style.height=\'140px\'">' +
      '<div class="meta">' +
        '<span class="grey">' + (r.grey != null ? (+r.grey).toFixed(1) : '') + '</span>' +
        '<span class="badge">' + (r.hour != null ? r.hour + 'h' : '') + ' · ' + (r.period || '') + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}
</script>
</body>
</html>
