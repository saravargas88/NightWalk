<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proxy Count Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; font-size: 14px; background: #f5f5f3; color: #1a1a18; padding: 2rem; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
  #drop { border: 1.5px dashed #bbb; border-radius: 12px; padding: 2rem; text-align: center; color: #888; cursor: pointer; transition: background 0.15s; background: #fff; margin-bottom: 1.5rem; }
  #drop:hover { background: #f0f0ee; }
  #drop input { display: none; }
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: #f0f0ee; border-radius: 8px; padding: 0.75rem 1rem; }
  .stat .lbl { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat .val { font-size: 22px; font-weight: 500; }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .toolbar select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; background: #fff; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #e5e5e3; overflow: hidden; }
  .labels { display: flex; gap: 6px; padding: 8px 10px; flex-wrap: wrap; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .b-tree  { background: #EAF3DE; color: #3B6D11; }
  .b-lamp  { background: #FAEEDA; color: #854F0B; }
  .b-store { background: #E6F1FB; color: #185FA5; }
  .card img { width: 100%; height: 160px; object-fit: cover; display: block; }
  #empty { color: #aaa; text-align: center; padding: 2rem; font-size: 13px; }
  #main { display: none; }
</style>
</head>
<body>

<h1>Proxy count viewer</h1>

<div id="drop" onclick="document.getElementById('fi').click()">
  <input type="file" id="fi" accept=".csv">
  <div style="font-size: 15px; font-weight: 500; margin-bottom: 6px;">Drop proxy_counts.csv here</div>
  <div style="font-size: 13px;">or click to browse</div>
</div>

<div id="main">
  <div class="summary">
    <div class="stat"><div class="lbl">Images</div><div class="val" id="s-img">0</div></div>
    <div class="stat"><div class="lbl">Total trees</div><div class="val" id="s-tree">0</div></div>
    <div class="stat"><div class="lbl">Total lampposts</div><div class="val" id="s-lamp">0</div></div>
    <div class="stat"><div class="lbl">Total storefronts</div><div class="val" id="s-store">0</div></div>
  </div>
  <div class="toolbar">
    <select id="sort">
      <option value="">Sort: default</option>
      <option value="trees_d">Trees ↓</option>
      <option value="trees_a">Trees ↑</option>
      <option value="lampposts_d">Lampposts ↓</option>
      <option value="lampposts_a">Lampposts ↑</option>
      <option value="storefronts_d">Storefronts ↓</option>
      <option value="storefronts_a">Storefronts ↑</option>
    </select>
  </div>
  <div id="grid"></div>
  <div id="empty" style="display:none">No matching rows.</div>
</div>

<script>
let rows = [];
const IMG_BASE = "urban-mosaic/washington-square/";

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  rows = lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  });
  document.getElementById('drop').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  updateSummary();
  render();
}

function updateSummary() {
  document.getElementById('s-img').textContent = rows.length;
  document.getElementById('s-tree').textContent = rows.reduce((a, r) => a + (+r.trees || 0), 0);
  document.getElementById('s-lamp').textContent = rows.reduce((a, r) => a + (+r.lampposts || 0), 0);
  document.getElementById('s-store').textContent = rows.reduce((a, r) => a + (+r.storefronts || 0), 0);
}

function getFiltered() {
  const sort = document.getElementById('sort').value;
  let filtered = [...rows];
  if (sort) {
    const [col, dir] = sort.split('_');
    filtered.sort((a, b) => dir === 'd' ? (+b[col] - +a[col]) : (+a[col] - +b[col]));
  }
  return filtered;
}

function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!filtered.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(r => `
    <div class="card">
      <div class="labels">
        <span class="badge b-tree">trees ${r.trees || 0}</span>
        <span class="badge b-lamp">lampposts ${r.lampposts || 0}</span>
        <span class="badge b-store">storefronts ${r.storefronts || 0}</span>
      </div>
      <img src="${IMG_BASE}${r.image}" onerror="this.style.display='none'" alt="">
    </div>
  `).join('');
}

document.getElementById('fi').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => parseCSV(ev.target.result);
  reader.readAsText(file);
});

const dropEl = document.getElementById('drop');
dropEl.addEventListener('dragover', e => { e.preventDefault(); dropEl.style.background = '#f0f0ee'; });
dropEl.addEventListener('dragleave', () => { dropEl.style.background = '#fff'; });
dropEl.addEventListener('drop', e => {
  e.preventDefault(); dropEl.style.background = '#fff';
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => parseCSV(ev.target.result);
  reader.readAsText(file);
});

document.getElementById('sort').addEventListener('change', render);
</script>
</body>
</html>
