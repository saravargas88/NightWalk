<!DOCTYPE html>

<head>

<title>DINO Experiment Viewer</title>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; padding: 16px; }
  h2 { margin-bottom: 4px; }
  p  { color: #aaa; font-size: 13px; margin-bottom: 12px; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .toggle { display: flex; background: #2a2a2a; border-radius: 6px; overflow: hidden; border: 1px solid #444; flex-wrap: wrap; }
  .toggle button { background: none; border: none; color: #aaa; padding: 6px 12px; cursor: pointer; font-size: 12px; white-space: nowrap; }
  .toggle button.active { background: #555; color: #fff; }
  .grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .card { width: 220px; background: #1e1e1e; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
  .card img { width: 100%; height: 155px; object-fit: cover; display: block; }
  .counts { display: flex; gap: 4px; padding: 6px 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 99px; }
  .b-tree  { background: #1a3d1a; color: #4CAF50; }
  .b-store { background: #0d2137; color: #2196F3; }
  .b-lamp  { background: #3d2800; color: #FF9800; }
  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:99; align-items:center; justify-content:center; cursor:zoom-out; }
.lightbox.open { display:flex; }
.lightbox img { max-width:90vw; max-height:90vh; object-fit:contain; border-radius:6px; }
</style>

const images  = ["dr5rsnqv7syb-dr5rsnqv42h2-cds-79ddade2485edbde-20160628-0959-19", "dr5rsnr9v45f-dr5rsnr9szt5-cds-13a07ea2578fefb5-20160810-1633-108", "dr5rsn6rj0hy-dr5rsn6quyr0-cds-b6d8aab376c7ce54-20160831-1216-17", "dr5rsp46stv3-dr5rsp46tcpv-cds-1ccda49b184cb0ef-20160630-1115-105", "dr5rsnm8hseh-dr5rsnjxz4r3-cds-19919ff6db95782d-20160829-1217-22", "dr5rsn9bsny5-dr5rsn9buvqb-cds-1ccda49b184cb0ef-20160701-1611-47", "dr5rsnfckgv9-dr5rsnfckgwd-cds-ea91d096e3932939-20160903-1612-94", "dr5rspjgewru-dr5rspjsm7gs-cds-63fa6a79d3217a87-20160702-1144-6", "dr5rsnxg811c-dr5rsnxg3k4s-cds-90e9ed36f13dd646-20160801-0834-73", "dr5rspp19kee-dr5rspp1cfz9-cds-b6d8aab376c7ce54-20160719-1452-132", "dr5rsnpt820x-dr5rsnpt826y-cds-79ddade2485edbde-20160713-1620-55", "dr5rspjuqh6b-dr5rspnj2fkx-cds-63fa6a79d3217a87-20160702-1144-29", "dr5rsn8zn6hq-dr5rsn8znhyt-cds-1ccda49b184cb0ef-20160630-1217-4", "dr5rsnpnuc3p-dr5rsnpnvjn2-cds-8eb89b94275011e0-20160804-1209-3", "dr5rsn9x0f5r-dr5rsn9rpusx-cds-13a07ea2578fefb5-20160728-1615-56", "dr5rsncvnx28-dr5rsncvnwgc-cds-1ccda49b184cb0ef-20160714-1127-11", "dr5rsnnmuxd2-dr5rsnnqh14x-cds-79ddade2485edbde-20160826-1546-179", "dr5rsns0xmxk-dr5rsns22zrp-cds-8b82a42e5a149e22-20160903-0930-87", "dr5rsp4zyhx4-dr5rsp4zvwpv-cds-79ddade2485edbde-20160717-1131-40", "dr5rsngm0et6-dr5rsngm12sh-cds-13a07ea2578fefb5-20160903-0809-9"];
let current   = exps[0];

function buildToggles() {
  const wrap = document.getElementById('exp-toggle');
  exps.forEach(e => {
    const btn = document.createElement('button');
    btn.textContent = e;
    btn.className = e === current ? 'active' : '';
    btn.onclick = () => { current = e; setActive(btn); render(); };
    wrap.appendChild(btn);
  });
}

function setActive(el) {
  document.querySelectorAll('#exp-toggle button').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function render() {
  const expData = data[current] || {};
  document.getElementById('grid').innerHTML = images.map(stem => {
    const r = expData[stem];
    if (!r) return '';
    return `
      <div class="card">
        <img src="${r.img}" loading="lazy" onerror="this.style.background='#333';this.style.height='155px'"
  onclick="document.getElementById('lightbox-img').src=this.src; document.getElementById('lightbox').classList.add('open')" style="cursor:zoom-in">
        <div class="counts">
          <span class="badge b-tree">trees ${r.trees}</span>
          <span class="badge b-store">stores ${r.storefronts}</span>
          <span class="badge b-lamp">lamps ${r.lampposts}</span>
        </div>
      </div>`;
  }).join('');
}

buildToggles();
render();
</script>

</div>
